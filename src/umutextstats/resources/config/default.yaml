      tag: AUX
    - key: syntax-root-interjection
      class: RootPOSTagDimension
      description: Percentage of sentences whose root is an interjection
      tag: INTJ
    - key: syntax-root-adverb
      class: RootPOSTagDimension
      description: Percentage of sentences whose root is an adverb
      tag: ADV
    - key: syntax-root-pronoun
      class: RootPOSTagDimension
