dimensions:
- key: digital-communication
  description: Linguistic and structural markers characteristic of digital communication, online interaction, and computer-mediated discourse
  children:

  - key: digital-addressivity
    description: Markers used to address, reference, tag, or index users, communities, or entities in online communication
    children:

    - key: digital-addressivity-hashtags
      class: PatternDimension
      description: Number of hashtags
      pattern: '(?<!\S)#[\p{L}\p{N}_]+'
      input_column: text_raw
      percentage: false
      separator: whole

    - key: digital-addressivity-mentions
      class: PatternDimension
      description: Number of user mentions
      pattern: '(?<!\S)@[\p{L}\p{N}_]+'
      input_column: text_raw
      percentage: false
      separator: by-word

    - key: digital-addressivity-mentions-medial
      class: PatternDimension
      description: Number of mentions appearing inside the message rather than at the beginning
      pattern: '(?<!^)(\s|\A)@([\p{L}\p{N}_]+)'
      input_column: text_raw
      percentage: false
      separator: whole

    - key: digital-addressivity-cashtags
      class: PatternDimension
      description: Number of cashtags referencing stocks or cryptocurrencies
      pattern: '(?<!\S)\$[A-Z]{1,5}(?![\p{L}\p{N}_])'
      input_column: text_raw
      percentage: false
      separator: by-word

    - key: digital-addressivity-community-references
      class: PatternDimension
      description: Number of online community references such as subreddit or user references
      pattern: '(?i)(?<![\p{L}\p{N}_/])(r/[\p{L}\p{N}_]+|u/[\p{L}\p{N}_]+|discord(?:\.gg|\.com/invite)?/\S+)'
      input_column: text_raw
      percentage: false
      separator: by-word
        
  - key: digital-linking
    description: Markers related to hyperlinking, external references, and networked navigation in digital texts
    children:

    - key: digital-linking-urls
      class: PatternDimension
      description: Number of hyperlinks
      pattern: 'https?://\S+|www\.\S+'
      input_column: text_raw
      percentage: false

    - key: digital-linking-shortened-urls
      class: PatternDimension
      description: Number of shortened URLs
      pattern: '(?i)\b(?:bit\.ly|t\.co|goo\.gl|tinyurl\.com)/\S+'
      input_column: text_raw
      percentage: false


  - key: digital-paralinguistics
    description: Non-verbal and visually expressive textual elements commonly used in computer-mediated communication
    children:

    - key: digital-paralinguistics-emojis
      class: PatternDimension
      description: Number of Unicode emojis and pictographic symbols
      pattern: '\p{Extended_Pictographic}'
      input_column: text_raw
      percentage: false
      separator: by-word

    - key: digital-paralinguistics-ascii-emoticons
      class: PatternDimension
      description: Number of ASCII emoticons
      pattern: >-
        (?:(?<![\p{L}\p{N}_])(?:[:;=8][-o*']?[\)\(dDpP/:\}\{@\|])|(?<![\p{L}\p{N}_])[xX]D|<3)
      input_column: text_raw
      percentage: false
      separator: by-word

    - key: digital-paralinguistics-flags
      class: PatternDimension
      description: Number of Unicode flag emojis based on regional indicator symbols
      pattern: '[\U0001F1E6-\U0001F1FF]{2}'
      input_column: text_raw
      percentage: false
      separator: by-word

    - key: digital-paralinguistics-skin-tones
      class: PatternDimension
      description: Number of Unicode emoji skin tone modifiers
      pattern: '[\U0001F3FB-\U0001F3FF]'
      input_column: text_raw
      percentage: false
      separator: by-word

  - key: digital-interaction-structure
    description: Structural markers associated with interaction flow, reposting, threading, and quoting in online discourse
    children:

    - key: digital-interaction-structure-reposts
      class: PatternDimension
      description: Number of repost or forwarding markers
      pattern: '(?i)(?<!\p{L})(rt|via)(?!\p{L})'
      input_column: text_raw
      percentage: false
      separator: by-word

    - key: digital-interaction-structure-thread-markers
      class: PatternDimension
      description: Number of thread or chained-post markers
      pattern: '(?i)(\b\d+/\d+\b|\b(?:abro|sigo|cierro)\s+hilo\b|\bhilo\s*\d+/\d+\b|\bthread\b)'
      input_column: text_raw
      percentage: false
      separator: by-word

    - key: digital-interaction-structure-quote-markers
      class: PatternDimension
      description: Number of quoting markers in digital communication
      pattern: '(?m)^\s*>+'
      input_column: text_raw
      percentage: false
      separator: whole


  - key: digital-platform-language
    description: Lexical markers and expressions associated with internet culture, online platforms, and digitally native language use
    children:

    - key: digital-platform-language-jargon
      class: WordPerDictionary
      description: Number of internet and platform-related jargon expressions
      dictionary: digital-platform-language-jargon
      input_column: text_raw